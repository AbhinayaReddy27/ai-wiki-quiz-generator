<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Wiki Quiz Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>AI Wiki Quiz Generator</h1>
    <p class="subtitle">Generate quizzes from any Wikipedia article using AI.</p>

    <div class="tabs">
      <button class="tab-button active" data-tab="generate-tab">Generate Quiz</button>
      <button class="tab-button" data-tab="history-tab">Past Quizzes</button>
    </div>

    <div id="generate-tab" class="tab-content active">
      <div class="card">
        <h2>Generate Quiz from Wikipedia URL</h2>
        <div class="form-row">
          <input id="url-input" type="text" placeholder="Enter Wikipedia article URL..." />
          <button id="generate-btn">Generate Quiz</button>
        </div>
        <div class="options-row">
          <label>
            <input type="checkbox" id="take-quiz-mode" />
            Take Quiz mode (hide answers until submit)
          </label>
        </div>
        <div id="status-message" class="status"></div>
      </div>

      <div id="quiz-output" class="quiz-output"></div>
    </div>

    <div id="history-tab" class="tab-content">
      <div class="card">
        <h2>Past Quizzes</h2>
        <table id="history-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>URL</th>
              <th>Created At</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="history-body">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="modal-close" class="modal-close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
